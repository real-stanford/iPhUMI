name: iphumi
channels:
  - conda-forge
dependencies:
  - python=3.10.20
  - ffmpeg=8.0.1=gpl_* # gpl version (compared to lgpl version) contains h264 encoder codec
  - pip==24.0
  - setuptools==65.5.0
  - wheel==0.38.4
  - boost=1.85.0 # needed for building pypeertalk
  - pybind11=3.0.3 # needed for building pypeertalk
  - av=16.0.1 # need to install `av` and `opencv` via conda to ensure they link against the same ffmpeg version (fixes a warning that happens on MacOS)
  - opencv=4.12.0
  - pip:
    - numpy==2.2.6
    - pandas==2.3.3
    - imageio==2.37.3
    - tqdm==4.68.3
    - scipy==1.15.3
    - hydra-core==1.3.3
    - omegaconf==2.3.1
    - matplotlib==3.10.9
    - flask-socketio==5.6.1
    - qrcode==8.2
    - zarr==2.18.3
    - numba==0.65.1
    - colorama==0.4.6
    - open3d==0.19.0
    - transforms3d==0.4.2
    - imagecodecs==2025.3.30
    - huggingface_hub==1.20.1
    - git+https://github.com/yihuai-gao/pypeertalk.git # installing from source rather than PyPI is better for use on MacOS as there are not prebuilt binaries for MacOS on PyPI yet

    - -e .. # install `iphumi` package
